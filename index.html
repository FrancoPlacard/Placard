<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Mi Placard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#EDE8DF;
    --surface:#F7F3EB;
    --surface-2:#F0EBE1;
    --ink:#2B2925;
    --ink-soft:#5C564C;
    --muted:#8A8276;
    --line:#DAD2C4;
    --accent:#3C4A57;      /* sumi indigo */
    --accent-soft:#5A6A78;
    --clay:#A8835F;        /* warm wood, sparing */
    --ok:#7A8C6E;
    --shadow:0 1px 2px rgba(43,41,37,.05), 0 8px 24px rgba(43,41,37,.06);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:"Zen Kaku Gothic New",system-ui,sans-serif;
    background:var(--paper);
    color:var(--ink);
    font-weight:400;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  .app{max-width:480px;margin:0 auto;padding:0 20px 110px;min-height:100vh;}

  /* header */
  header{padding:30px 0 8px;}
  .eyebrow{
    font-size:11px;letter-spacing:.22em;text-transform:uppercase;
    color:var(--muted);font-weight:500;display:flex;align-items:center;gap:8px;
  }
  .eyebrow .dot{width:5px;height:5px;border-radius:50%;background:var(--clay);display:inline-block;}
  h1{
    font-weight:300;font-size:34px;letter-spacing:-.01em;margin:10px 0 2px;line-height:1.1;
  }
  h1 b{font-weight:700;}
  .sub{color:var(--ink-soft);font-size:14px;font-weight:300;}

  /* mode toggle */
  .toggle{
    display:flex;background:var(--surface-2);border:1px solid var(--line);
    border-radius:999px;padding:4px;margin:22px 0 6px;gap:4px;
  }
  .toggle button{
    flex:1;border:0;background:transparent;font-family:inherit;cursor:pointer;
    padding:10px 8px;border-radius:999px;font-size:13.5px;font-weight:500;color:var(--ink-soft);
    letter-spacing:.02em;transition:all .25s ease;
  }
  .toggle button.on{background:var(--ink);color:var(--paper);box-shadow:var(--shadow);}

  .note{
    font-size:12.5px;color:var(--muted);margin:10px 2px 0;display:flex;gap:7px;align-items:flex-start;
  }

  /* outfit cards */
  .cards{margin-top:18px;display:flex;flex-direction:column;gap:14px;}
  .card{
    background:var(--surface);border:1px solid var(--line);border-radius:18px;
    padding:18px 18px 16px;box-shadow:var(--shadow);
    opacity:0;transform:translateY(10px);
    animation:rise .5s cubic-bezier(.2,.7,.2,1) forwards;
  }
  @keyframes rise{to{opacity:1;transform:none;}}
  .card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
  .opt{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);font-weight:500;}
  .pill{
    font-size:11px;font-weight:500;letter-spacing:.04em;color:var(--accent);
    background:rgba(60,74,87,.08);border-radius:999px;padding:4px 11px;
  }
  .rows{display:flex;flex-direction:column;gap:11px;}
  .row{display:flex;align-items:center;gap:13px;}
  .sw{
    width:34px;height:34px;border-radius:9px;flex:none;border:1px solid rgba(43,41,37,.12);
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.18);
  }
  .row .meta{min-width:0;}
  .row .kind{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:500;}
  .row .name{font-size:15px;color:var(--ink);font-weight:500;line-height:1.25;}
  .why{font-size:12.5px;color:var(--ink-soft);font-weight:300;margin:14px 0 0;font-style:normal;}
  .use{
    margin-top:14px;width:100%;border:1px solid var(--ink);background:transparent;color:var(--ink);
    font-family:inherit;font-size:14px;font-weight:500;padding:12px;border-radius:11px;cursor:pointer;
    transition:all .2s ease;letter-spacing:.01em;
  }
  .use:active{transform:scale(.985);}
  .use.done{background:var(--ok);border-color:var(--ok);color:#fff;}

  .reshuffle{
    margin:18px auto 0;display:flex;align-items:center;gap:9px;justify-content:center;
    background:transparent;border:0;color:var(--accent);font-family:inherit;font-size:14px;
    font-weight:500;cursor:pointer;padding:8px 4px;width:100%;
  }
  .reshuffle svg{width:16px;height:16px;}

  .empty{
    text-align:center;color:var(--muted);font-size:14px;font-weight:300;
    background:var(--surface);border:1px dashed var(--line);border-radius:16px;padding:34px 24px;margin-top:18px;
  }
  .empty b{display:block;color:var(--ink);font-weight:500;font-size:15px;margin-bottom:6px;}

  /* placard */
  .stat{display:flex;gap:10px;margin:20px 0 6px;}
  .stat .box{flex:1;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:13px 15px;}
  .stat .n{font-size:24px;font-weight:300;}
  .stat .l{font-size:11px;color:var(--muted);letter-spacing:.04em;}
  .group{margin-top:22px;}
  .group h2{
    font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);
    font-weight:500;margin:0 0 10px;display:flex;justify-content:space-between;
  }
  .items{display:flex;flex-direction:column;gap:7px;}
  .item{
    display:flex;align-items:center;gap:12px;background:var(--surface);
    border:1px solid var(--line);border-radius:12px;padding:9px 12px;cursor:pointer;
    transition:opacity .2s ease;
  }
  .item .sw{width:26px;height:26px;border-radius:7px;}
  .item .nm{flex:1;font-size:14px;font-weight:400;}
  .item .tag{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;font-weight:500;color:var(--muted);}
  .item.worn{opacity:.42;}
  .item.worn .tag{color:var(--clay);}
  .reset{
    margin:26px 0 0;width:100%;border:1px solid var(--line);background:var(--surface);
    color:var(--ink-soft);font-family:inherit;font-size:13.5px;font-weight:500;
    padding:13px;border-radius:12px;cursor:pointer;
  }

  /* tab bar */
  nav{
    position:fixed;left:0;right:0;bottom:0;background:rgba(237,232,223,.92);
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:1px solid var(--line);
    padding:8px 0 calc(8px + env(safe-area-inset-bottom));
  }
  .nav-in{max-width:480px;margin:0 auto;display:flex;}
  nav button{
    flex:1;background:transparent;border:0;font-family:inherit;cursor:pointer;
    padding:8px;color:var(--muted);font-size:11px;font-weight:500;letter-spacing:.06em;
    display:flex;flex-direction:column;align-items:center;gap:4px;
  }
  nav button.on{color:var(--ink);}
  nav button svg{width:21px;height:21px;}

  .hidden{display:none;}
  ::selection{background:rgba(168,131,95,.25);}
  @media (prefers-reduced-motion: reduce){.card{animation:none;opacity:1;transform:none;}}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="eyebrow"><span class="dot"></span><span id="eyebrow">HOY</span></div>
    <h1 id="h1">¿Qué me <b>pongo?</b></h1>
    <div class="sub" id="sub">Tres opciones, sin repetir lo de esta semana.</div>
  </header>

  <!-- HOY -->
  <section id="view-hoy">
    <div class="toggle">
      <button id="m-of" class="on" onclick="setMode('oficina')">Oficina</button>
      <button id="m-rx" onclick="setMode('relajado')">Relajado</button>
    </div>
    <div class="note hidden" id="daynote"></div>
    <div class="cards" id="cards"></div>
    <button class="reshuffle" onclick="shuffle()" id="reshuffleBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3h5v5"/><path d="M4 20 21 3"/><path d="M21 16v5h-5"/><path d="m15 15 6 6"/><path d="M4 4l5 5"/></svg>
      Ver otras opciones
    </button>
  </section>

  <!-- PLACARD -->
  <section id="view-placard" class="hidden">
    <div class="stat">
      <div class="box"><div class="n" id="stat-avail">0</div><div class="l">disponibles</div></div>
      <div class="box"><div class="n" id="stat-worn">0</div><div class="l">lavando</div></div>
    </div>
    <div id="placard-groups"></div>
    <button class="reset" onclick="resetWeek()">Reiniciar semana · ya lavé todo</button>
  </section>
</div>

<nav>
  <div class="nav-in">
    <button id="tab-hoy" class="on" onclick="setTab('hoy')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M20 7h-9"/><path d="M14 17H5"/><circle cx="17" cy="17" r="3"/><circle cx="7" cy="7" r="3"/></svg>
      HOY
    </button>
    <button id="tab-placard" onclick="setTab('placard')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>
      PLACARD
    </button>
  </div>
</nav>

<script>
/* ---------- Inventario ---------- */
// color: hex swatch · f: formalidad 1-5 · tuck: dentro/fuera · pat: patrón opcional
const SHIRTS = [
  {id:'c1', name:'Rayas finas celeste/marrón', col:'lightblue', hex:'#cdd9e3', f:4, tuck:'dentro', pat:'stripe'},
  {id:'c2', name:'Rayas celeste y blanca',     col:'lightblue', hex:'#c6d6e7', f:4, tuck:'dentro', pat:'stripe'},
  {id:'c3', name:'Lila clara',                 col:'lilac',     hex:'#d6cce2', f:4, tuck:'dentro'},
  {id:'c4', name:'Celeste lisa',               col:'lightblue', hex:'#bcd0e0', f:4, tuck:'dentro'},
  {id:'c5', name:'Blanca lisa (1)',            col:'white',     hex:'#f1eee7', f:5, tuck:'dentro'},
  {id:'c6', name:'Blanca lisa (2)',            col:'white',     hex:'#f1eee7', f:5, tuck:'dentro'},
  {id:'c8', name:'Rosa claro c/ bolsillo',     col:'pink',      hex:'#e6cdd2', f:3, tuck:'dentro'},
  {id:'c7', name:'Azul marino',                col:'navy',      hex:'#2b3a55', f:2, tuck:'fuera'},
  {id:'c9', name:'Lino celeste y blanca',      col:'lightblue', hex:'#c2d2dc', f:2, tuck:'fuera', pat:'linen'},
  {id:'c10',name:'Lino marrón claro',          col:'tan',       hex:'#b6a489', f:2, tuck:'fuera', pat:'linen'},
  {id:'c11',name:'Lino celeste',               col:'lightblue', hex:'#aac3d4', f:2, tuck:'fuera', pat:'linen'},
  {id:'c12',name:'De jean',                    col:'denim',     hex:'#6f8aa6', f:2, tuck:'fuera'},
  {id:'c13',name:'Rayas marrón y blanca',      col:'tan',       hex:'#c4b4a0', f:2, tuck:'fuera', pat:'stripe'},
  {id:'c14',name:'Blanca c/ bolsillo',         col:'white',     hex:'#f1eee7', f:2, tuck:'fuera'},
];
const TEES = [
  {id:'t1', name:'Remera blanca',       col:'white', hex:'#f1eee7', f:1, tuck:'-'},
  {id:'t2', name:'Remera gris oscuro',  col:'grey',  hex:'#4a4d52', f:1, tuck:'-'},
  {id:'t3', name:'Remera vino',         col:'wine',  hex:'#6e2b35', f:1, tuck:'-'},
  {id:'t4', name:'Remera azul',         col:'blue',  hex:'#3a5a8c', f:1, tuck:'-'},
  {id:'t5', name:'Remera negra',        col:'black', hex:'#232323', f:1, tuck:'-'},
];
const PANTS = [
  {id:'p1', name:'Chino khaki oscuro',  col:'darkkhaki', hex:'#8a8064', f:4},
  {id:'p2', name:'Chino verde oliva',   col:'olive',     hex:'#6f7253', f:3},
  {id:'p3', name:'Chino negro',         col:'black',     hex:'#2a2a2a', f:4},
  {id:'p4', name:'Chino gris oscuro',   col:'darkgrey',  hex:'#4c4f54', f:4},
  {id:'p5', name:'Chino azul',          col:'blue',      hex:'#3f5878', f:4},
  {id:'p6', name:'Chino khaki claro',   col:'lightkhaki',hex:'#b6a585', f:2},
  {id:'p7', name:'Chino gris (casual)', col:'grey',      hex:'#6a6d72', f:2},
];
const SHOES = [
  {id:'s1', name:'Cole Haan marrones',          col:'tan',   hex:'#b69b76', f:3, fam:'brown'},
  {id:'s2', name:'Cole Haan blancas',           col:'white', hex:'#ecebe4', f:4, fam:'white'},
  {id:'s3', name:'Adidas gamuza marrón',        col:'brown', hex:'#463a30', f:2, fam:'brown'},
  {id:'s4', name:'Adidas blancas det. marrón',  col:'white', hex:'#ebe9e2', f:2, fam:'white'},
];
const ALL_CLOTHES = [...SHIRTS, ...TEES, ...PANTS]; // lo que se lava (el calzado no)
const byId = {}; [...SHIRTS,...TEES,...PANTS,...SHOES].forEach(i=>byId[i.id]=i);

/* ---------- Reglas de color ---------- */
const SHIRT_PANT = {
  white:    {default:2},
  lightblue:{blue:1, black:1, default:2},
  lilac:    {grey:2, darkgrey:2, blue:2, darkkhaki:2, lightkhaki:2, olive:1, black:1, default:1},
  pink:     {grey:2, darkgrey:2, blue:2, darkkhaki:2, lightkhaki:2, olive:1, black:1, default:1},
  navy:     {darkkhaki:2, lightkhaki:2, darkgrey:2, grey:2, olive:1, blue:0, black:1, default:1},
  tan:      {olive:2, blue:2, darkgrey:2, grey:2, darkkhaki:1, lightkhaki:1, black:1, default:1},
  denim:    {darkkhaki:2, lightkhaki:2, darkgrey:2, grey:2, olive:2, blue:0, black:1, default:1},
};
const TEE_PANT = {
  white:{default:2},
  grey: {black:1, default:2},
  wine: {darkkhaki:2, grey:2, darkgrey:2, olive:2, blue:1, black:1, default:1},
  blue: {darkkhaki:2, grey:2, darkgrey:2, olive:1, black:1, blue:0, default:1},
  black:{darkkhaki:2, olive:2, grey:1, darkgrey:1, blue:1, black:0, default:1},
};
const PANT_SHOE = {
  white:{default:2},
  brown:{blue:2, darkgrey:2, grey:2, olive:2, darkkhaki:1, lightkhaki:1, black:0, default:1},
};
function look(tbl, key, sub){ const r=tbl[key]; if(!r) return 1; return (sub in r)?r[sub]:r.default; }

/* ---------- Estado ---------- */
let mode = 'oficina';
let tab  = 'hoy';
let worn = [];          // [{id, date}]
let currentOutfits = [];
const mem = {};
const store = {
  async get(k){
    try{ if(window.storage){ const r=await window.storage.get(k); return r? JSON.parse(r.value):null; } }catch(e){}
    try{ const v=localStorage.getItem(k); return v? JSON.parse(v):null; }catch(e){}
    return (k in mem)?mem[k]:null;
  },
  async set(k,v){
    try{ if(window.storage){ await window.storage.set(k, JSON.stringify(v)); return; } }catch(e){}
    try{ localStorage.setItem(k, JSON.stringify(v)); return; }catch(e){}
    mem[k]=v;
  },
};

function lastMonday(){
  const d=new Date(); d.setHours(0,0,0,0);
  const back=(d.getDay()+6)%7; d.setDate(d.getDate()-back); return d;
}
function activeWorn(){ const m=lastMonday().getTime(); return worn.filter(w=>new Date(w.date).getTime()>=m); }
function wornSet(){ return new Set(activeWorn().map(w=>w.id)); }
function isWorn(id){ return wornSet().has(id); }

/* ---------- Generador ---------- */
function pools(){
  const ws=wornSet();
  let tops, pants, shoes;
  if(mode==='oficina'){
    tops  = SHIRTS.filter(s=>s.f>=3 && !ws.has(s.id));
    pants = PANTS.filter(p=>p.f>=3 && !ws.has(p.id));
    shoes = SHOES.filter(s=>s.f>=3);              // Cole Haan
  }else{
    const infShirts = SHIRTS.filter(s=>s.f<=3);   // lino, jean, navy, rosa, blanca casual
    tops  = [...infShirts, ...TEES].filter(s=>!ws.has(s.id));
    pants = PANTS.filter(p=>!ws.has(p.id));
    shoes = SHOES.slice();                          // todas
  }
  return {tops, pants, shoes};
}
function scoreCombo(top, pant, shoe){
  const isTee = top.id[0]==='t';
  const sp = isTee ? look(TEE_PANT, top.col, pant.col) : look(SHIRT_PANT, top.col, pant.col);
  const ps = look(PANT_SHOE, shoe.fam, pant.col);
  let s = sp*2 + ps*1.5;
  if(mode==='oficina'){ if(top.f>=4) s+=.3; if(shoe.id==='s2') s+=.15; }
  else { if(shoe.f<=2) s+=.5; if(isTee) s+=.25; }
  return {s, sp, ps, isTee};
}
function buildOutfits(){
  const {tops, pants, shoes}=pools();
  const combos=[];
  tops.forEach(t=>pants.forEach(p=>shoes.forEach(sh=>{
    const sc=scoreCombo(t,p,sh);
    if(sc.sp===0||sc.ps===0) return;           // descartar choques
    combos.push({top:t, pant:p, shoe:sh, ...sc, r:sc.s+Math.random()*0.7});
  })));
  combos.sort((a,b)=>b.r-a.r);
  const out=[], usedTop=new Set(), usedPant=new Set();
  for(const c of combos){
    if(usedTop.has(c.top.id)) continue;
    if(usedPant.has(c.pant.id) && out.length<2) continue;
    out.push(c); usedTop.add(c.top.id); usedPant.add(c.pant.id);
    if(out.length===3) break;
  }
  return out;
}
function reason(c){
  if(c.top.col==='white') return 'La blanca es comodín, va con todo.';
  if(c.shoe.fam==='white') return 'Zapatillas blancas, limpian cualquier combo.';
  if(c.sp===2 && c.ps===2) return 'Colores que combinan derecho.';
  if(c.isTee) return 'Relajado pero prolijo.';
  if(c.top.col==='tan'||c.top.col==='denim') return 'Tono tierra, queda canchero por fuera.';
  return 'Combinación segura.';
}
function belt(c){
  if(c.shoe.fam==='brown') return 'marrón';
  return c.pant.col==='black' ? 'negro' : 'marrón';
}

/* ---------- Render: HOY ---------- */
const dayNames=['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
function autoMode(){
  const d=new Date().getDay();
  if(d>=1&&d<=3) return 'oficina';
  return 'relajado';
}
function swatchStyle(it){
  if(it.pat==='stripe') return `background:repeating-linear-gradient(90deg, ${it.hex} 0 4px, #f4f1ea 4px 7px);`;
  if(it.pat==='linen')  return `background:${it.hex};background-image:linear-gradient(135deg, rgba(255,255,255,.18) 25%, transparent 25%, transparent 50%, rgba(255,255,255,.18) 50%, rgba(255,255,255,.18) 75%, transparent 75%);background-size:6px 6px;`;
  return `background:${it.hex};`;
}
function row(kind, it){
  return `<div class="row"><div class="sw" style="${swatchStyle(it)}"></div>
    <div class="meta"><div class="kind">${kind}</div><div class="name">${it.name}</div></div></div>`;
}
function renderHoy(){
  const d=new Date().getDay();
  document.getElementById('eyebrow').textContent = `${dayNames[d].toUpperCase()} · ${mode==='oficina'?'OFICINA':'RELAJADO'}`;
  const dn=document.getElementById('daynote');
  if(d===5||d===0||d===6){ dn.classList.remove('hidden'); dn.innerHTML='🏠 Finde / home office — igual te tiro opciones si salís.'; }
  else { dn.classList.add('hidden'); }

  const cards=document.getElementById('cards');
  document.getElementById('m-of').classList.toggle('on', mode==='oficina');
  document.getElementById('m-rx').classList.toggle('on', mode==='relajado');

  if(currentOutfits.length===0){
    cards.innerHTML=`<div class="empty"><b>Ya casi no queda nada limpio</b>Usaste casi todo esta semana. Andá a “Placard” y reiniciá la semana cuando hayas lavado.</div>`;
    document.getElementById('reshuffleBtn').style.display='none';
    return;
  }
  document.getElementById('reshuffleBtn').style.display='flex';
  cards.innerHTML = currentOutfits.map((c,i)=>`
    <div class="card" style="animation-delay:${i*0.07}s">
      <div class="card-top">
        <span class="opt">Opción ${i+1}</span>
        <span class="pill">${c.top.tuck==='dentro'?'Por dentro':(c.top.tuck==='fuera'?'Por fuera':'Remera')}</span>
      </div>
      <div class="rows">
        ${row(c.isTee?'Remera':'Camisa', c.top)}
        ${row('Chino', c.pant)}
        ${row('Zapatillas', c.shoe)}
      </div>
      <p class="why">${reason(c)} <span style="color:var(--clay)">·</span> Cinturón ${belt(c)}.</p>
      <button class="use" id="use-${i}" onclick="useOutfit(${i})">Usé este hoy</button>
    </div>`).join('');
}
function shuffle(){ currentOutfits=buildOutfits(); renderHoy(); }

async function useOutfit(i){
  const c=currentOutfits[i];
  const date=new Date().toISOString();
  [c.top.id, c.pant.id].forEach(id=>{ worn.push({id, date}); });  // calzado NO se lava
  await store.set('worn', worn);
  const btn=document.getElementById('use-'+i);
  btn.textContent='✓ Anotado — que rinda'; btn.classList.add('done');
  setTimeout(()=>{ currentOutfits=buildOutfits(); renderHoy(); if(tab==='placard') renderPlacard(); }, 750);
}

/* ---------- Render: PLACARD ---------- */
function itemRow(it, washable){
  const w = washable && isWorn(it.id);
  return `<div class="item ${w?'worn':''}" onclick="toggleWorn('${it.id}', ${washable})">
    <div class="sw" style="${swatchStyle(it)}"></div>
    <div class="nm">${it.name}</div>
    <div class="tag">${washable ? (w?'Lavando':'Limpia') : 'Siempre'}</div>
  </div>`;
}
function group(title, arr, washable, sub){
  return `<div class="group"><h2>${title}<span>${sub||''}</span></h2><div class="items">${arr.map(i=>itemRow(i,washable)).join('')}</div></div>`;
}
function renderPlacard(){
  const avail = ALL_CLOTHES.length - activeWorn().length;
  document.getElementById('stat-avail').textContent = avail;
  document.getElementById('stat-worn').textContent  = activeWorn().length;
  document.getElementById('placard-groups').innerHTML =
    group('Camisas', SHIRTS, true) +
    group('Remeras', TEES, true) +
    group('Chinos', PANTS, true) +
    group('Calzado', SHOES, false, 'no se lava');
}
async function toggleWorn(id, washable){
  if(!washable) return;
  if(isWorn(id)){ worn = worn.filter(w=>w.id!==id); }
  else { worn.push({id, date:new Date().toISOString()}); }
  await store.set('worn', worn);
  renderPlacard();
}
async function resetWeek(){
  worn=[]; await store.set('worn', worn);
  currentOutfits=buildOutfits(); renderPlacard(); renderHoy();
}

/* ---------- Navegación ---------- */
function setTab(t){
  tab=t;
  document.getElementById('view-hoy').classList.toggle('hidden', t!=='hoy');
  document.getElementById('view-placard').classList.toggle('hidden', t!=='placard');
  document.getElementById('tab-hoy').classList.toggle('on', t==='hoy');
  document.getElementById('tab-placard').classList.toggle('on', t==='placard');
  const h1=document.getElementById('h1'), sub=document.getElementById('sub'), eb=document.getElementById('eyebrow');
  if(t==='placard'){ h1.innerHTML='Mi <b>placard</b>'; sub.textContent='Tocá una prenda para marcarla como usada o limpia.'; eb.textContent='INVENTARIO'; renderPlacard(); }
  else { h1.innerHTML='¿Qué me <b>pongo?</b>'; sub.textContent='Tres opciones, sin repetir lo de esta semana.'; renderHoy(); }
}
function setMode(m){ mode=m; currentOutfits=buildOutfits(); renderHoy(); }

/* ---------- Init ---------- */
(async function(){
  worn = (await store.get('worn')) || [];
  mode = autoMode();
  currentOutfits = buildOutfits();
  renderHoy();
})();
</script>
</body>
